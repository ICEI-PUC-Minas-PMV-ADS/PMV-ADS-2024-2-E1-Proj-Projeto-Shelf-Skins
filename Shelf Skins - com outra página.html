<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprar Skins</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    .navbar {
      width: 100%;
      background-color: #7254a8fb;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      font-size: 16px;
    }

    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin-top: 20px;
    }

    .skins-grid {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
    }

    .skin-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .skin-item img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .button-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .buy-button {
      background-color: #28a745;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .buy-button:hover {
      background-color: #218838;
    }

    .back-button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .back-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Botão Voltar -->
  <a href="index.html" class="back-button">Voltar</a>

  <div class="container">
    <h2>Selecione suas Skins</h2>
    <div class="skins-grid">
      <!-- CSGO Skins -->
      <div class="skin-item">
        <img src="csgo_skin1.png" alt="CSGO Skin 1">
        <p>CSGO Skin 1</p>
      </div>
      <div class="skin-item">
        <img src="csgo_skin2.png" alt="CSGO Skin 2">
        <p>CSGO Skin 2</p>
      </div>

      <!-- Dota 2 Skins -->
      <div class="skin-item">
        <img src="dota2_skin1.png" alt="Dota 2 Skin 1">
        <p>Dota 2 Skin 1</p>
      </div>
      <div class="skin-item">
        <img src="dota2_skin2.png" alt="Dota 2 Skin 2">
        <p>Dota 2 Skin 2</p>
      </div>
